<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astronomia Avanzata - L'universo alla portata di tutti</title>
<meta name="description" content="Community di astronomia con news, quiz, giochi e foto NASA. Scopri il cosmo da Campotosto e Poggio Cancelli.">
<meta name="keywords" content="astronomia, spazio, nasa, telescopio, stelle, campotosto">
<link rel="canonical" href="https://www.astronomiaavanzata.it/">
<style>
body{background:#020208 radial-gradient(1.5px 1.5px at 20px 30px,#fff,transparent) repeat;background-size:300px 300px;color:#fff;margin:0;font-family:sans-serif;overflow-x:hidden;}
.spazio-sfondo-fisso{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;}
.stella-cadente-nuova{position:absolute;top:-100px;width:4px;height:4px;background:#fff;border-radius:50%;animation:caduta 4s linear infinite;box-shadow:0 0 8px #fff;}
.stella-cadente-nuova::after {content:'';position:absolute;width:80px;height:2px;background:linear-gradient(to left,#00e5ff,transparent);transform:rotate(135deg);transform-origin:top left;}
.stella-cadente-nuova:nth-child(1){left:5%;animation-duration:3.5s;}
.stella-cadente-nuova:nth-child(2){left:45%;animation-delay:2s;animation-duration:5s;}
.stella-cadente-nuova:nth-child(3){left:80%;animation-delay:1s;animation-duration:4s;}
@keyframes caduta{0%{transform:translate(0,0);opacity:0;}10%{opacity:1;}100%{transform:translate(80vh,80vh);opacity:0;}}
.pianeta-sfondo{position:absolute;border-radius:50%;opacity:0.25;animation:ruota 25s linear infinite;background-size:200% 100%;}
.marte-nuovo{top:20%;right:8%;width:55px;height:55px;background:radial-gradient(circle at 30% 30%,#ff4d4d,#990000,#ff4d4d);}
.nettuno-nuovo{top:75%;left:5%;width:75px;height:75px;background:radial-gradient(circle at 30% 30%,#4da6ff,#003366,#4da6ff);animation-duration:40s;}
.giove-nuovo{top:40%;left:10%;width:90px;height:90px;background:radial-gradient(circle at 30% 30%,#e0a86e,#8b5a2b,#e0a86e);animation-duration:35s;}
@keyframes ruota{0%{transform:rotate(0deg);background-position:0% 50%;}100%{transform:rotate(360deg);background-position:100% 50%;}}
section,.box-gadget-centrato{background:rgba(13,27,42,0.85);padding:20px;border-radius:12px;max-width:700px;margin:20px auto;border:1px solid #1b4965;text-align:center;backdrop-filter:blur(5px);}
h1,h2,h3{color:#00e5ff;}
input,button{width:85%;padding:10px;margin:5px;border-radius:5px;border:none;background:#0d1b2a;color:#fff;box-sizing:border-box;}
button{background:#00e5ff;color:#000;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{transform:scale(1.03);}
nav{background:rgba(13,27,42,0.95);padding:12px;text-align:center;position:sticky;top:0;z-index:10;border-bottom:1px solid #00e5ff;}
nav a{color:#00e5ff;margin:0 15px;text-decoration:none;font-weight:bold;font-size:14px;}
nav a:hover{color:#fff;}
#preloader{position:fixed;top:0;left:0;width:100%;height:100%;background:#020208;z-index:9999;display:flex;justify-content:center;align-items:center;animation:svanisciPreloader 0.5s ease 2.5s forwards;}
.solar-system{position:relative;width:160px;height:160px;}
.sun{position:absolute;top:65px;left:65px;width:30px;height:30px;background:#ffcc00;border-radius:50%;box-shadow:0 0 20px #ff9900;}
.orbit{position:absolute;border:1px dashed rgba(255,255,255,0.15);border-radius:50%;animation:spin linear infinite;}
.orbit-1{top:45px;left:45px;width:70px;height:70px;animation-duration:3s;}
.orbit-2{top:25px;left:25px;width:110px;height:110px;animation-duration:5s;}
.orbit-3{top:5px;left:5px;width:150px;height:150px;animation-duration:8s;}
.planet{position:absolute;top:0;left:50%;width:10px;height:10px;border-radius:50%;transform:translateX(-50%);}
.p1{background:#ff4d4d;}.p2{background:#00e5ff;}.p3{background:#ffcc00;}
@keyframes spin{100%{transform:rotate(360deg);}}
@keyframes svanisciPreloader{0%{opacity:1;visibility:visible;}100%{opacity:0;visibility:hidden;display:none;}}
.btn-social{color:#fff;font-size:13px;width:auto;padding:10px 18px;border-radius:20px;text-decoration:none;display:inline-block;margin:5px;font-weight:bold;}
.btn-youtube{background:#ff0000;box-shadow:0 0 10px rgba(255,0,0,0.3);}
.btn-whatsapp{background:#25d366;box-shadow:0 0 10px rgba(37,211,102,0.3);}
.btn-sito{background:#00e5ff;color:#000;box-shadow:0 0 10px rgba(0,229,255,0.3);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
#reddit-board{max-height:250px;overflow-y:auto;text-align:left;margin:15px auto;width:90%;}
.reddit-post{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:12px;margin-bottom:12px;animation:fadeIn 0.5s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.post-header{font-size:11px;color:#888;margin-bottom:6px;}
.post-user{color:#ffcc00;font-weight:bold;}
.post-content{font-size:14px;color:#eee;margin-bottom:10px;}
.post-actions{display:flex;gap:15px;align-items:center;font-size:12px;}
.vote-btn{background:none;width:auto;padding:0;margin:0;color:#aaa;font-size:14px;cursor:pointer;}
.vote-count{font-weight:bold;color:#00e5ff;min-width:15px;text-align:center;}
.reply-link{color:#ff007f;cursor:pointer;font-weight:bold;}
.quiz-opt{background:#1a3a5f;color:#fff;margin:5px auto;width:90%;display:block;text-align:left;padding:8px;cursor:pointer;}
.quiz-opt:hover{background:#00e5ff;color:#000;}
#area-gioco{position:relative;width:100%;height:150px;background:#050c14;border-radius:8px;margin-top:10px;overflow:hidden;}
#stella-target{position:absolute;width:25px;height:25px;background:#fff;border-radius:50%;box-shadow:0 0 15px #fff;cursor:pointer;display:none;line-height:25px;text-align:center;font-size:18px;}
.page{display:none;}
.page.active{display:block;}
.titolo-sezione{border-left:4px solid #00e5ff;padding-left:10px;text-align:left;}
</style>
</head>
<body>
<div id="preloader"><div class="solar-system"><div class="sun"></div><div class="orbit orbit-1"><div class="planet p1"></div></div><div class="orbit orbit-2"><div class="planet p2"></div></div><div class="orbit orbit-3"><div class="planet p3"></div></

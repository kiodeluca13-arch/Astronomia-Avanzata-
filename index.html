    /* SFONDO SPAZIALE: Nero profondo con tantissime stelle fisse */
    body {
        background-color: #020208 !important;
        background-image: 
            radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)),
            radial-gradient(1px 1px at 40px 70px, #ffffff, rgba(0,0,0,0)),
            radial-gradient(2px 2px at 90px 110px, #ffffff, rgba(0,0,0,0)),

        background-size: 300px 300px;
        color: #ffffff !important;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        position: relative;
        font-family: sans-serif;
    }

    /* CONTENITORE DELLO SFONDO */
    .spazio-sfondo {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
    }

    /* LE STELLE CADENTI: Cadono in diagonale verso il basso-destra con testa bianca davanti */
    .stella-cadente {
        position: absolute;
        top: -100px;
        width: 4px;
        height: 4px;
        background: #ffffff;
        border-radius: 50%;
        box-shadow: 0 0 8px #ffffff;
        animation: caduta-diagonale linear infinite;
    }
    /* Creazione della scia azzurra dietro la testa */
    .stella-cadente::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 80px;
        height: 2px;
        background: linear-gradient(to left, rgba(0, 229, 255, 0.8), rgba(0, 229, 255, 0));
        transform: rotate(135deg);
        transform-origin: top left;
    }
    
    .stella-cadente:nth-child(1) { left: 5%; animation-delay: 0s; animation-duration: 4s; }
    .stella-cadente:nth-child(2) { left: 40%; animation-delay: 2.5s; animation-duration: 5s; }
    .stella-cadente:nth-child(3) { left: 70%; animation-delay: 1.2s; animation-duration: 3.5s; }

    @keyframes caduta-diagonale {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translate(80vh, 80vh); opacity: 0; }
    }

    /* PIANETI ROTANTI SULLO SFONDO */
    .pianeta-sfondo {
        position: absolute;
        border-radius: 50%;
        opacity: 0.35;
        animation: ruotaPianeta 25s linear infinite; 
    }
    .marte {
        top: 20%;
        right: 8%;
        width: 55px;
        height: 55px;
        background: radial-gradient(circle at 30% 30%, #ff4d4d, #990000, #ff4d4d);
        background-size: 200% 100%;
        box-shadow: inset -10px -10px 25px rgba(0,0,0,0.9), 0 0 10px rgba(255,77,77,0.2);
    }
    .nettuno {
        top: 75%;
        left: 5%;
        width: 75px;
        height: 75px;
        background: radial-gradient(circle at 30% 30%, #4da6ff, #003366, #4da6ff);
        background-size: 200% 100%;
        box-shadow: inset -12px -12px 30px rgba(0,0,0,0.9), 0 0 15px rgba(77,166,255,0.2);
        animation-duration: 40s;
    }

    @keyframes ruotaPianeta {
        0% { transform: rotate(0deg); background-position: 0% 50%; }
        100% { transform: rotate(360deg); background-position: 100% 50%; }
    }

    /* STILE GENERALE DEI RIGUADRI GADGET */
    .box-gadget {
        background: rgba(13, 27, 42, 0.85);

        text-align: center;

// FUNZIONE PER CARICARE LA FOTO DEL GIORNO DALLA NASA
async function caricaFotoNasa() {
    const contenitore = document.getElementById('contenitoreMediaNasa');
    const titolo = document.getElementById('titoloNasa');
    const dataElement = document.getElementById('dataNasa');
    
    try {
        const risposta = await fetch('https://nasa.gov');
        const dati = await risposta.json();
        
        titolo.innerText = dati.title;
        dataElement.innerText = "DATA NASA: " + dati.date;
        
        if(dati.media_type === "image") {
            contenitore.innerHTML = `<img src="${dati.url}" style="width:100%; border-radius:8px; box-shadow: 0 0 10px rgba(0,0,0,0.5);" alt="${dati.title}">`;
        } else if(dati.media_type === "video") {
            contenitore.innerHTML = `<iframe src="${dati.url}" style="width:100%; height:200px; border:none; border-radius:8px;"></iframe>`;
        }
    } catch (errore) {
        contenitore.innerHTML = "<p style='color:#ff4d4d; font-size:12px;'>Impossibile caricare l'immagine odierna da NASA TV.</p>";
    }
}

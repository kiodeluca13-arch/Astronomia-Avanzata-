<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astronomia Avanzata</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif}
body{background:#000;color:#fff;overflow-x:hidden}

/* LOADER SISTEMA SOLARE */
#loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.3s}
#loader h2{color:#00e5ff;font-size:28px;margin-bottom:30px;text-shadow:0 0 15px #00e5ff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.sistema{position:relative;width:200px;height:200px}
.sole{position:absolute;top:50%;left:50%;width:40px;height:40px;background:radial-gradient(#ffdd00,#ff9900);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 30px #ff9900;z-index:2}
.orbita{position:absolute;top:50%;left:50%;border:1px dashed rgba(0,229,255,0.3);border-radius:50%;transform-origin:center;animation:ruota linear infinite}
.pianeta{position:absolute;top:-6px;left:50%;border-radius:50%;transform:translateX(-50%)}
.o1{width:60px;height:60px;animation-duration:2s}
.o2{width:80px;height:80px;animation-duration:3s}
.o3{width:100px;height:100px;animation-duration:4s}
.o4{width:120px;height:120px;animation-duration:5s}
.o5{width:150px;height:150px;animation-duration:6s}
.mercurio{width:8px;height:8px;background:#aaa}
.venere{width:12px;height:12px;background:#e6c229}
.terra{width:14px;height:14px;background:#00aaff}
.marte{width:10px;height:10px;background:#ff4500}
.giove{width:18px;height:18px;background:#d8ca9d}
@keyframes ruota{100%{transform:translate(-50%,-50%) rotate(360deg)}}

.spazio-sfondo-fisso{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:-2;overflow:hidden}
.stella-fissa{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:0.2}50%{opacity:1}}
.logo-header{max-width:280px;width:90%;margin:0 auto 15px;display:block;filter:drop-shadow(0 0 15px #00e5ff)}
header{text-align:center;padding:30px 20px}
h1{color:#00e5ff;font-size:32px;text-shadow:0 0 10px #00e5ff}
.slogan{color:#aaa;font-size:16px;margin-bottom:20px}
.btn-principale{background:#00e5ff;color:#000;border:none;padding:15px 25px;border-radius:8px;font-weight:bold;font-size:16px;cursor:pointer;width:90%;max-width:400px}
.btn-whatsapp{background:#25D366;color:#fff;text-decoration:none;display:inline-block;margin-top:15px;padding:15px 25px;border-radius:8px;font-weight:bold}
nav{background:#0a1a2a;padding:12px;display:flex;justify-content:space-around;position:sticky;top:0;z-index:10;border-bottom:2px solid #00e5ff;flex-wrap:wrap}
.nav-btn{color:#00e5ff;background:none;border:none;font-weight:bold;font-size:14px;padding:8px;cursor:pointer}
.box{background:#0d1b2a;margin:15px;border-radius:12px;padding:20px;border:1px solid #1b4965;text-align:center}
.box h2{color:#00e5ff;margin-bottom:15px;font-size:22px}
input{width:90%;padding:12px;margin:8px 0;border-radius:6px;border:none;background:#091220;color:#fff;font-size:15px}
.btn-box{background:#00e5ff;color:#000;border:none;padding:12px;border-radius:6px;width:90%;font-weight:bold;cursor:pointer;font-size:16px;margin:5px 0}
.btn-arancione{background:#ff9900}.btn-verde{background:#00ff88}
.page{display:none}.page.active{display:block}
#reddit-board{max-height:250px;overflow-y:auto;text-align:left}
.reddit-post{background:rgba(255,255,255,0.05);padding:10px;border-radius:6px;margin-bottom:8px;text-align:left;border-left:3px solid #ff9900}
.reddit-post b{color:#ffcc00}
#foto-creatore{max-width:180px;border-radius:10px;margin:10px auto;display:block;border:2px solid #00e5ff}
#pwdPop,#uploadPop{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center}
.popBox{background:#111;padding:25px;border-radius:12px;text-align:center;width:90%;max-width:350px;border:1px solid #333}
.quiz-opzione{background:#1b4965;margin:5px 0;padding:12px;border-radius:6px;cursor:pointer}
.quiz-opzione:hover{background:#00e5ff;color:#000}
.classifica-item{display:flex;justify-content:space-between;padding:8px;background:rgba(0,229,255,0.1);margin:5px 0;border-radius:5px}
#game-area{width:100%;height:300px;background:radial-gradient(#0a1a2a,#000);border-radius:10px;position:relative;overflow:hidden;border:2px solid #00e5ff;margin:10px 0}
.game-obj{position:absolute;border-radius:50%;cursor:pointer;z-index:5}
.stella-game{width:20px;height:20px;background:radial-gradient(#fff,#00e5ff);box-shadow:0 0 10px #00e5ff}
.cometa-game{width:25px;height:25px;background:radial-gradient(#ffdd00,#ff9900);box-shadow:0 0 15px #ff9900}
#game-score{font-size:24px;color:#00e5ff;margin:10px 0;font-weight:bold}
#game-timer{font-size:16px;color:#ff9900}
.admin-gallery{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.admin-gallery img{width:100px;height:100px;object-fit:cover;border-radius:8px;border:2px solid #00e5ff}
.link-iss{background:#ff9900;color:#000;text-decoration:none;padding:12px;border-radius:8px;font-weight:bold;display:block;margin-top:10px}
</style>
</head>
<body>

<div id="loader">
  <h2>✨ ASTRONOMIA AVANZATA ✨</h2>
  <div class="sistema">
    <div class="sole"></div>
    <div class="orbita o1"><div class="pianeta mercurio"></div></div>
    <div class="orbita o2"><div class="pianeta venere"></div></div>
    <div class="orbita o3"><div class="pianeta terra"></div></div>
    <div class="orbita o4"><div class="pianeta marte"></div></div>
    <div class="orbita o5"><div class="pianeta giove"></div></div>
  </div>
</div>

<div class="spazio-sfondo-fisso" id="sfondo-stelle"></div>
<header>
<img src="logo-astro.png" class="logo-header">
<h1>Astronomia Avanzata</h1>
<p class="slogan">L'universo alla portata di tutti</p>
<button class="btn-principale" id="btn-iscriviti">✨ ISCRIVITI AL SITO</button>
</header>
<nav>
<button class="nav-btn" data-page="home">🏠 Home</button>
<button class="nav-btn" data-page="giochi">🎮 Giochi</button>
<button class="nav-btn" data-page="nasa">🛰️ NASA</button>
<button class="nav-btn" data-page="admin">🔐 Admin</button>
<button class="nav-btn" data-page="chi-siamo">👨‍🚀 Chi Siamo</button>
</nav>

<div id="box-iscrizione" class="box" style="display:none;"><h2>Diventa un Membro! 🌌</h2><input type="email" id="email-utente" placeholder="Email"><button class="btn-box" id="btn-unisciti">Unisciti</button></div>
<div id="home" class="page active"><div class="box"><h2>Benvenuto</h2><h2 id="contatore-iscritti" style="font-size:40px;">0</h2><p>Appassionati nella Community</p></div></div>
<div id="giochi" class="page"><div class="box"><h2>⭐ Acchiappa Stelle e Comete ⭐</h2><div id="game-area"></div><button class="btn-box btn-verde" id="btn-inizia-gioco">Inizia Gioco</button></div></div>
<div id="nasa" class="page"><div class="box"><h2>🛰️ NASA</h2></div></div>
<div id="admin" class="page"><div class="box"><h2>🔐 Admin</h2></div></div>
<div id="chi-siamo" class="page"><div class="box"><h2>👨‍🚀 Chi Siamo</h2><a href="https://share.google/JJP384LrAcHHmotmi" class="btn-principale btn-whatsapp" target="_blank">💬 Canale WhatsApp</a></div></div>

<script>
window.addEventListener('load',function(){
    // NASCONDE LOADER DOPO 1 SECONDO
    setTimeout(function(){document.getElementById('loader').style.opacity='0';setTimeout(function(){document.getElementById('loader').style.display='none'},300)},1000);
    
    // STELLE
    const sfondo=document.getElementById('sfondo-stelle');
    for(let i=0;i<100;i++){let s=document.createElement('div');s.className='stella-fissa';s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';sfondo.appendChild(s);}
    
    // NAVIGAZIONE
    document.querySelectorAll('.nav-btn').forEach(function(btn){
        btn.addEventListener('click',function(){
            document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});
            document.getElementById(this.getAttribute('data-page')).classList.add('active');
        });
    });

    document.getElementById('btn-iscriviti').addEventListener('click',function(){let b=document.getElementById('box-iscrizione');b.style.display=b.style.display==='none'?'block':'none';});
</script>
</body></html>
